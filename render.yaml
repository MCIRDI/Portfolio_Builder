databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user
    plan: starter

services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: bash ./build.sh
    startCommand: gunicorn backend.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.vercel\\.app$"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
