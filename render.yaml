services:

  - type: web

    name: portfolio-backend

    runtime: python

    rootDir: backend

    plan: starter

    buildCommand: bash ./build.sh

    startCommand: gunicorn backend.wsgi:application

    healthCheckPath: /health/

    envVars:

      - key: PYTHON_VERSION

        value: 3.11.11

      - key: SECRET_KEY

        generateValue: true

      - key: DEBUG

        value: "False"

      - key: ALLOWED_HOSTS

        value: ".onrender.com,localhost,127.0.0.1"

      - key: CORS_ALLOWED_ORIGINS

        value: "https://buildmyfolio.vercel.app,https://localhost:5173"

      - key: CORS_ALLOWED_ORIGIN_REGEXES

        value: "^https://.*\\.vercel\\.app$"

      - key: CORS_ALLOW_ALL_ORIGINS

        value: "True"

      - key: CSRF_TRUSTED_ORIGINS

        value: "https://buildmyfolio.vercel.app"

      - key: DATABASE_URL

        value: "postgresql://neondb_owner:npg_W2zIaCwd0Jhq@ep-snowy-field-akq99hcy-pooler.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
